{% extends 'base.html' %}

{% block content %}
<main class="container py-5">
    <div class="row">
        <div class="col-md-4 offset-md-4">
            
            <h1 class="text-center mb-4">{{ task.title }}</h1>
            <p class="text-danger text-center">{{error}}</p>
            
            <form method="POST" action="{% url 'task_detail' task.id %}" class="card card-body mb-3">
                {% csrf_token %}
                {{form.as_p}}
                <button class="btn btn-primary mt-2">Actualizar Tarea</button>
            </form>

            <div class="d-flex justify-content-between">
                {% if not task.datecompleted %}
                    <form action="{% url 'complete_task' task.id %}" method="POST">
                        {% csrf_token %}
                        <button class="btn btn-success">Completar</button>
                    </form>
                {% endif %}
                
                <form action="{% url 'delete_task' task.id %}" method="POST">
                    {% csrf_token %}
                    <button class="btn btn-danger">Eliminar</button>
                </form>
            </div>

        </div>
    </div>
</main>
{% endblock %}

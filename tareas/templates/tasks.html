{% extends 'base.html' %}

{% block content %}
<main class="container py-5">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <h1 class="mb-4 text-center">Mis Tareas</h1>
            <div class="list-group">
                {% for task in tasks %}
                    <a href="{% url 'task_detail' task.id %}" class="list-group-item list-group-item-action">
                        <div class="d-flex w-100 justify-content-between">
                            <h5 class="mb-1 fw-bold">{{ task.title }}</h5>
                            <small class="text-muted">{{ task.created|date:"M d, Y" }}</small>
                        </div>
                        <p class="mb-1">{{ task.description }}</p>
                        {% if task.important %}
                            <span class="badge bg-danger">Importante</span>
                        {% endif %}
                    </a>
                {% empty %}
                    <div class="alert alert-info text-center">
                        Aún no tienes tareas creadas.
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</main>
{% endblock %}

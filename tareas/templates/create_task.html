{% extends 'base.html' %}

{% block content %}
<main class="container py-5">
    <div class="row">
        <div class="col-md-4 offset-md-4">
            <form action="/tareas/crear/" method="POST" class="card card-body">
                <h1 class="text-center mb-4">Crear Tarea</h1>
                <p class="text-danger text-center">{{error}}</p>
                {% csrf_token %}
                
                {{form.as_p}}
                
                <button class="btn btn-success mt-3">Guardar Tarea</button>
            </form>
        </div>
    </div>
</main>
{% endblock %}
